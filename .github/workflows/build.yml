name: build-and-deploy

on:
  schedule:
    - cron: '0 2 * * *'        # 02:00 UTC nightly
  workflow_dispatch: {}         # manual trigger for "new set just dropped"
  push:
    branches: [main]
    paths-ignore:
      - 'data/prices-fresh.json'

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write                # needed for cache/save

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:unit
      - name: Fetch exchange rates
        run: npm run fetch-exchange-rates
      - name: Fetch TCGdex catalog + prices
        run: npm run build:data
        env:
          PUBLIC_BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp || github.run_started_at }}
      - name: Push today's history snapshot to D1
        run: npm run push-history-to-d1
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Pull history snapshot from Worker
        run: npm run pull-history-from-worker
        continue-on-error: true
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}

      # Snapshot the freshly-fetched data so prices-fast-poll can rebuild
      # without a TCGdex round-trip. Unique key per run so saves never
      # conflict; fast-poll uses `restore-keys: pokemon-data-` to pick the
      # most-recent matching entry. Cache lives 7 days, easily long enough
      # for the next nightly to refresh it.
      - name: Snapshot data/ for fast-poll
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/cards.json
            data/prices-baseline.json
            data/sparkline-snapshot.json
            data/range-snapshot.json
          key: pokemon-data-${{ github.run_id }}

      - name: Build static site
        run: npm run build:site
        env:
          PUBLIC_BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp || github.run_started_at }}
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
