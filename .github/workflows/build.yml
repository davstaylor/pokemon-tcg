name: build-and-deploy

on:
  schedule:
    - cron: '0 2 * * *'        # 02:00 UTC nightly
  workflow_dispatch: {}         # manual trigger for "new set just dropped"
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:unit
      # TEMPORARY: fixture build. The live-fetch pipeline (`npm run build`)
      # needs a strategy for TCGdex's ~30k-request cost — see the "Live-data
      # pipeline" design task. Until that lands, CI deploys from the checked-in
      # fixture (data/fixtures/sample-cards.json), which produces a small but
      # correct site. Switch `build:fixtures` back to `build` once the live-fetch
      # strategy is in place.
      - name: Build (fixture — live-fetch strategy pending)
        run: npm run build:fixtures
        env:
          PUBLIC_BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp || github.run_started_at }}
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
