name: prices-fast-poll

# Polls Cardmarket via TCGdex every 5 minutes, commits data/prices-fresh.json
# if anything changed. The actual rebuild + Pages deploy is handled by
# build.yml, which runs nightly + on push. This workflow used to also run
# `npm run build:fixtures` and deploy the result — that was a fixture build
# (FIXTURES=1, only 2 cards) and silently clobbered the full 23k-card
# nightly artifact. We now commit the prices and let the next full build
# pick them up.

on:
  schedule:
    - cron: '*/5 * * * *'     # every 5 minutes
  workflow_dispatch: {}

permissions:
  contents: write             # needs to commit data/prices-fresh.json

concurrency:
  group: price-update
  cancel-in-progress: false   # let runs queue, don't drop updates

jobs:
  poll-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch fresh prices
        run: npm run fetch-prices-fresh

      - name: Commit prices-fresh.json if changed
        run: |
          if git diff --quiet data/prices-fresh.json; then
            echo "No price changes — skipping commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/prices-fresh.json
            git commit -m "chore(prices): update fresh prices"
            git push
            echo "Committed fresh prices. Next build.yml run (nightly @ 02:00 UTC, or any push) will pick them up."
          fi
